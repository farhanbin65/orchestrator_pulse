name: Orchestrator Pulse — Auto Post

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-core \
            fonts-noto-extra \
            fonts-noto-ui-core \
            xvfb \
            libgl1

      - name: Install Python dependencies
        run: |
          pip install \
            requests \
            feedparser \
            Pillow \
            python-dotenv \
            groq \
            opencv-python-headless \
            numpy \
            bangla-text-renderer

      - name: Create .env from GitHub secrets
        run: |
          echo "PAGE_ID=${{ secrets.PAGE_ID }}"                                 >> .env
          echo "PAGE_ACCESS_TOKEN=${{ secrets.PAGE_ACCESS_TOKEN }}"             >> .env
          echo "APP_ID=${{ secrets.APP_ID }}"                                   >> .env
          echo "APP_SECRET=${{ secrets.APP_SECRET }}"                           >> .env
          echo "BANGLA_PAGE_ID=${{ secrets.BANGLA_PAGE_ID }}"                   >> .env
          echo "BANGLA_PAGE_ACCESS_TOKEN=${{ secrets.BANGLA_PAGE_ACCESS_TOKEN }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"                       >> .env

      - name: Run pipeline
        run: xvfb-run python main.py

      - name: Upload card images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: output-cards
          path: output/