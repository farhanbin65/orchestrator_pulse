name: Daily AI News Post

on:
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8:00 AM UTC (9AM UK time)
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser Pillow python-dotenv

      - name: Create .env file from secrets
        run: |
          echo "PAGE_ID=${{ secrets.PAGE_ID }}" >> .env
          echo "PAGE_ACCESS_TOKEN=${{ secrets.PAGE_ACCESS_TOKEN }}" >> .env
          echo "APP_ID=${{ secrets.APP_ID }}" >> .env
          echo "APP_SECRET=${{ secrets.APP_SECRET }}" >> .env

      - name: Run pipeline
        run: python main.py
